<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CREOVA</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f6f3fb}
.hero{height:320px;background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;color:white;padding:30px}
nav button{margin:6px;padding:12px 18px;border-radius:20px;border:none}
.card{background:white;margin:20px;padding:20px;border-radius:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.item{border:1px solid #ddd;padding:10px;border-radius:15px}
img{max-width:100%;border-radius:12px}
</style></head>
<body>
<div class="hero">
<h1>CREOVA</h1>
<h2>Find your place. Plan your trip.</h2>
<nav>
<button>Ziel</button><button>Planen</button><button>Infos</button><button>Packliste</button>
<button>Touren</button><button>Galerie</button><button>Budget</button>
<button>Haus</button><button>Wecker</button><button>Timeline</button>
</nav>
</div>
<div class="card">
<h2>🎯 Ziel finden</h2>
<p>Komplette Demo-Version.</p>
<div class="grid">
<div class="item"><img src="https://picsum.photos/400/250?1"><h3>Campingplatz</h3></div>
<div class="item"><img src="https://picsum.photos/400/250?2"><h3>Restaurant</h3></div>
<div class="item"><img src="https://picsum.photos/400/250?3"><h3>Aktivität</h3></div>
</div>
</div>
<div class="card"><h2>🎒 Packliste</h2><p>Produkte mit Bildern je nach Reiseziel.</p></div>
</body></html>
